<!DOCTYPE html>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #ffffff;
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'SF Pro Display','Segoe UI',system-ui,sans-serif;
}
svg { width: 100%; height: auto; display: block; }
</style>
</head>

<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">
<defs>
  <!-- Cell fill colors for 7-color frequency reuse -->
  <pattern id="dots" patternUnits="userSpaceOnUse" width="8" height="8">
    <circle cx="4" cy="4" r="1" fill="#94a3b8" opacity="0.3"/>
  </pattern>

  <!-- Glow filters -->
  <filter id="glow_blue" x="-40%" y="-40%" width="180%" height="180%">
    <feGaussianBlur stdDeviation="4" result="blur"/>
    <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000022"/>
  </filter>

  <!-- Signal wave animation -->
  <style>
    .wave1 { animation: pulse 2.4s ease-out infinite; transform-origin: center; }
    .wave2 { animation: pulse 2.4s ease-out 0.8s infinite; transform-origin: center; }
    .wave3 { animation: pulse 2.4s ease-out 1.6s infinite; transform-origin: center; }
    @keyframes pulse {
      0%   { opacity: 0.8; r: 6px; }
      100% { opacity: 0; r: 36px; }
    }
    .ue-dot { animation: blink 3s ease-in-out infinite alternate; }
    @keyframes blink { from { opacity: 0.7; } to { opacity: 1; } }
  </style>
</defs>
