<style>
*{box-sizing:border-box}
.ctrl{display:flex;align-items:center;gap:12px;margin:8px 0;font-size:13px;color:var(--color-text-secondary)}
.ctrl label{min-width:90px;font-weight:500;color:var(--color-text-primary)}
.ctrl input{flex:1}
.ctrl .v{min-width:64px;text-align:right;font-family:var(--font-mono);font-size:12px;color:var(--color-text-info)}
.product-card{display:flex;align-items:center;justify-content:center;gap:20px;margin:10px 0;padding:10px 16px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-lg);background:var(--color-background-secondary)}
.pc-item{text-align:center}
.pc-num{font-size:20px;font-weight:500;font-family:var(--font-mono)}
.pc-lbl{font-size:11px;color:var(--color-text-secondary);margin-top:2px}
.pc-eq{font-size:18px;color:var(--color-text-tertiary);padding:0 4px}
.panels{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px}
.plbl{font-size:11px;color:var(--color-text-secondary);margin-bottom:3px;font-weight:500}
canvas{display:block;width:100%;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-tertiary)}
.insight{font-size:12px;color:var(--color-text-secondary);margin-top:6px;padding:8px 12px;border-left:2px solid var(--color-border-info);background:var(--color-background-info);border-radius:0 var(--border-radius-md) var(--border-radius-md) 0;color:var(--color-text-info)}
</style>

<div class="ctrl">
  <label>脉冲宽度 τ</label>
  <input type="range" id="sl-tau" min="5" max="95" value="40" step="1">
  <span class="v" id="v-tau">4.0 单位</span>
</div>

<div class="product-card">
  <div class="pc-item">
    <div class="pc-num" id="pc-tau" style="color:var(--color-text-info)">4.0</div>
    <div class="pc-lbl">τ（脉冲宽度）</div>
  </div>
  <div class="pc-eq">×</div>
  <div class="pc-item">
    <div class="pc-num" id="pc-bw" style="color:#0F6E56">0.25</div>
    <div class="pc-lbl">B（带宽，第一零点）</div>
  </div>
  <div class="pc-eq">=</div>
  <div class="pc-item">
    <div class="pc-num" id="pc-prod" style="color:var(--color-text-primary)">1.00</div>
    <div class="pc-lbl">τ · B（始终 ≈ 1）</div>
  </div>
</div>

<div class="panels">
  <div>
    <div class="plbl">时域：矩形脉冲（宽度 = τ）</div>
    <canvas id="cv-t" height="180"></canvas>
  </div>
  <div>
    <div class="plbl">频域：sinc 频谱（带宽 B = 1/τ）</div>
    <canvas id="cv-f" height="180"></canvas>
  </div>
</div>

<div class="insight" id="insight-text">脉冲越窄 → 频谱越宽。这是数学上的必然：窄脉冲需要高频成分来构造锐利的边沿。</div>

<script>
(function(){
const cvT=document.getElementById('cv-t'), ctT=cvT.getContext('2d');
const cvF=document.getElementById('cv-f'), ctF=cvF.getContext('2d');
const DPR=devicePixelRatio||1;

function sinc(x){return Math.abs(x)<1e-9?1:Math.sin(Math.PI*x)/(Math.PI*x);}

function resize(){
  [cvT,cvF].forEach(cv=>{
    const w=cv.parentElement.clientWidth||300;
    cv.width=w*DPR; cv.height=180*DPR; cv.style.height='180px';
  });
  [ctT,ctF].forEach(ct=>ct.setTransform(DPR,0,0,DPR,0,0));
}

function dk(){return matchMedia('(prefers-color-scheme:dark)').matches;}

function draw(){
  resize();
  const isDk=dk();
  const gridC=isDk?'rgba(194,192,182,0.08)':'rgba(61,61,58,0.07)';
  const axC=isDk?'rgba(194,192,182,0.3)':'rgba(61,61,58,0.25)';
  const txtC=isDk?'#888780':'#888780';
  const bgC=isDk?'rgba(255,255,255,0.02)':'rgba(0,0,0,0.015)';

  const tauPct=+document.getElementById('sl-tau').value;
  const tau=tauPct/10;
  const bw=1/tau;

  document.getElementById('v-tau').textContent=tau.toFixed(1)+' 单位';
  document.getElementById('pc-tau').textContent=tau.toFixed(1);
  document.getElementById('pc-bw').textContent=bw.toFixed(3);
  document.getElementById('pc-prod').textContent=(tau*bw).toFixed(2);

  const ins=document.getElementById('insight-text');
  if(tau<3){
    ins.textContent='τ 很窄（'+tau.toFixed(1)+'）→ 带宽 B = '+bw.toFixed(2)+' 很宽。需要大量高频成分才能构造如此锐利的脉冲边沿。';
  } else if(tau>7){
    ins.textContent='τ 很宽（'+tau.toFixed(1)+'）→ 带宽 B = '+bw.toFixed(2)+' 很窄。缓慢变化的信号只需要低频成分，频谱集中在零点附近。';
  } else {
    ins.textContent='τ · B = '+tau.toFixed(1)+' × '+bw.toFixed(3)+' = 1.00，无论如何调整，乘积始终等于 1。这就是时频不确定性原理。';
  }

  const WF=180;
  const Wt=cvT.parentElement.clientWidth||300;
  const Wf=cvF.parentElement.clientWidth||300;
  const H=180;
  const pad={l:36,r:14,t:20,b:28};

  function drawGrid(ct,W){
    ct.clearRect(0,0,W,H);
    ct.fillStyle=bgC; ct.fillRect(0,0,W,H);
    ct.strokeStyle=gridC; ct.lineWidth=0.5;
    const pl=pad.l, pr=W-pad.r, pt=pad.t, pb=H-pad.b;
    for(let i=1;i<4;i++){
      const y=pt+(pb-pt)*i/4;
      ct.beginPath(); ct.moveTo(pl,y); ct.lineTo(pr,y); ct.stroke();
    }
    for(let i=1;i<4;i++){
      const x=pl+(pr-pl)*i/4;
      ct.beginPath(); ct.moveTo(x,pt); ct.lineTo(x,pb); ct.stroke();
    }
    ct.strokeStyle=axC; ct.lineWidth=0.9;
    ct.beginPath(); ct.moveTo(pl,pb); ct.lineTo(pr,pb); ct.stroke();
    ct.beginPath(); ct.moveTo(pl,pt); ct.lineTo(pl,pb); ct.stroke();
  }

  function label(ct,t,x,y,align='center',c=txtC){
    ct.fillStyle=c; ct.font='10px var(--font-sans,sans-serif)';
    ct.textAlign=align; ct.fillText(t,x,y);
  }

  const tRange=10;
  const pl=pad.l, pt=pad.t;

  drawGrid(ctT,Wt);
  {
    const pr=Wt-pad.r, pb=H-pad.b;
    const plotW=pr-pl, plotH=pb-pt;
    const halfTau=tau/2;
    const midX=pl+plotW/2;

    ctT.strokeStyle=axC; ctT.lineWidth=0.8;
    ctT.beginPath(); ctT.moveTo(midX,pt); ctT.lineTo(midX,pb); ctT.stroke();

    const l=midX-halfTau/tRange*plotW*2;
    const r=midX+halfTau/tRange*plotW*2;

    ctT.fillStyle='rgba(24,95,165,0.15)';
    ctT.fillRect(l,pt+4,r-l,plotH-4);

    ctT.strokeStyle='#185FA5'; ctT.lineWidth=2;
    ctT.beginPath();
    ctT.moveTo(pl,pb); ctT.lineTo(l,pb);
    ctT.lineTo(l,pt+4);
    ctT.lineTo(r,pt+4);
    ctT.lineTo(r,pb); ctT.lineTo(pr,pb);
    ctT.stroke();

    ctT.strokeStyle=axC; ctT.lineWidth=0.7; ctT.setLineDash([3,3]);
    ctT.beginPath(); ctT.moveTo(l,pt+4); ctT.lineTo(l,pb); ctT.stroke();
    ctT.beginPath(); ctT.moveTo(r,pt+4); ctT.lineTo(r,pb); ctT.stroke();
    ctT.setLineDash([]);

    ctT.strokeStyle='#185FA5'; ctT.lineWidth=1.2;
    const arY=pt+16;
    ctT.beginPath(); ctT.moveTo(l+3,arY); ctT.lineTo(r-3,arY); ctT.stroke();
    label(ctT,'τ = '+tau.toFixed(1),(l+r)/2,arY-4,'center','#0C447C');

    label(ctT,'-T/2',l,pb+12,'center',txtC);
    label(ctT,'+T/2',r,pb+12,'center',txtC);
    label(ctT,'0',midX,pb+12,'center',txtC);
    label(ctT,'t →',pr,pb+12,'right',txtC);
    label(ctT,'1',pl-3,pt+8,'right',txtC);
    label(ctT,'0',pl-3,pb,'right',txtC);
  }

  drawGrid(ctF,Wf);
  {
    const pr=Wf-pad.r, pb=H-pad.b;
    const plotW=pr-pl, plotH=pb-pt;
    const fRange=2.0;
    const midX=pl+plotW/2;

    ctF.strokeStyle=axC; ctF.lineWidth=0.8;
    ctF.beginPath(); ctF.moveTo(midX,pt); ctF.lineTo(midX,pb); ctF.stroke();

    ctF.strokeStyle='#0F6E56'; ctF.lineWidth=2;
    ctF.beginPath();
    let started=false;
    for(let i=0;i<=300;i++){
      const f=(i/300)*fRange*2-fRange;
      const px=pl+(f+fRange)/(2*fRange)*plotW;
      const val=sinc(f*tau);
      const py=pb-Math.max(0,val)*plotH*0.88;
      if(!started){ctF.moveTo(px,py);started=true;}
      else ctF.lineTo(px,py);
    }
    ctF.stroke();

    ctF.strokeStyle='#0F6E56'; ctF.lineWidth=1.5;
    ctF.globalAlpha=0.3;
    ctF.beginPath();
    for(let i=0;i<=300;i++){
      const f=(i/300)*fRange*2-fRange;
      const px=pl+(f+fRange)/(2*fRange)*plotW;
      const val=sinc(f*tau);
      const py=pb-val*plotH*0.88;
      if(i===0)ctF.moveTo(px,py); else ctF.lineTo(px,py);
    }
    ctF.stroke();
    ctF.globalAlpha=1;

    const nullF=bw;
    if(nullF<fRange){
      const nullX=pl+(nullF+fRange)/(2*fRange)*plotW;
      const nullXL=pl+(-nullF+fRange)/(2*fRange)*plotW;

      ctF.strokeStyle='#854F0B'; ctF.lineWidth=1; ctF.setLineDash([4,3]);
      ctF.beginPath(); ctF.moveTo(nullX,pt+4); ctF.lineTo(nullX,pb); ctF.stroke();
      ctF.beginPath(); ctF.moveTo(nullXL,pt+4); ctF.lineTo(nullXL,pb); ctF.stroke();
      ctF.setLineDash([]);

      ctF.strokeStyle='#854F0B'; ctF.lineWidth=1.5;
      const arY=pt+14;
      ctF.beginPath(); ctF.moveTo(nullXL+3,arY); ctF.lineTo(nullX-3,arY); ctF.stroke();
      label(ctF,'B=1/τ='+bw.toFixed(2),midX,arY-4,'center','#633806');

      label(ctF,'-1/τ',nullXL,pb+12,'center',txtC);
      label(ctF,'+1/τ',nullX,pb+12,'center',txtC);
    }

    label(ctF,'0',midX,pb+12,'center',txtC);
    label(ctF,'f →',pr,pb+12,'right',txtC);
    label(ctF,'τ',pl-3,pt+8,'right',txtC);
    label(ctF,'0',pl-3,pb,'right',txtC);
  }
}

document.getElementById('sl-tau').addEventListener('input',draw);
window.addEventListener('resize',draw);
draw();
})();
</script>
